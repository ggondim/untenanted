# Working template — Zitadel + Untenanted, one Postgres, separate databases.
#
# This is the placeholder docker-compose proven by the end-to-end SPEC
# verification at examples/zitadel-app/ (see that directory's TEST_REPORT.md).
# Copy this file, drop your own image registry / secrets / ports in place of
# the ${...} variables, mount infra/postgres/02-untenanted.sql, and you have a
# self-hosted Zitadel + Untenanted environment matching the SPEC architecture.
#
# Required env file (see examples/zitadel-app/.env for a working set):
#   ZITADEL_DOMAIN, ZITADEL_EXTERNALPORT, ZITADEL_EXTERNALSECURE,
#   ZITADEL_PUBLIC_SCHEME, ZITADEL_MASTERKEY, ZITADEL_VERSION,
#   TRAEFIK_IMAGE, POSTGRES_IMAGE, PROXY_HTTP_PUBLISHED_PORT,
#   POSTGRES_ADMIN_USER, POSTGRES_ADMIN_PASSWORD, POSTGRES_DB,
#   ZITADEL_DATABASE_POSTGRES_DSN, LOGIN_CLIENT_PAT_EXPIRATION,
#   ADMIN_MACHINE_PAT_EXPIRATION, UNTENANTED_HOST_PORT,
#   UNTENANTED_AUDIENCE, UNTENANTED_CLIENT_ID, UNTENANTED_CLIENT_SECRET,
#   CLAIM_ORG_ID, CLAIM_TIDS, INTERNAL_AUTH_SECRET, WEBHOOK_AUTH_SECRET
#
# Required external files:
#   ./infra/postgres/02-untenanted.sql   — provisions the `untenanted` DB+user
#                                          alongside Zitadel's `zitadel` DB.
#
# Adapter:
#   The Zitadel↔Untenanted bridge is bundled as the
#   `@untenanted/adapter-zitadel` package, loaded INSIDE the untenanted-api
#   process when IDP_ADAPTERS=zitadel. No separate container is needed.
#   Zitadel Action v2 Targets point at
#   `http://untenanted-api:3000/adapters/zitadel/{preaccesstoken,events}`.
#
# Verified facts (see TEST_REPORT.md):
# - Single Postgres container hosts both databases without conflict.
# - Action v2 PreAccessToken successfully injects custom claims into the JWT.
# - Action v2 Event executions on `group: user` / `group: org` fire on user/org
#   deletion and the adapter forwards the normalized event to Untenanted.
# - The hostname `auth.localtest.me` (public wildcard DNS → 127.0.0.1) plus a
#   Docker network alias keeps the issuer URL identical from host and inside
#   the compose network — required for JWKS reach.
# - Traefik must listen on the same port that's advertised externally
#   (entrypoint :8080) so containers can fetch `http://<domain>:8080/...` the
#   same way the host does.

name: untenanted-zitadel

services:
  proxy:
    image: ${TRAEFIK_IMAGE}
    restart: unless-stopped
    networks:
      zitadel:
        aliases:
          - ${ZITADEL_DOMAIN}     # so sibling containers can reach the issuer URL
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=zitadel
      - --entrypoints.web.address=:8080
      - --entrypoints.websecure.address=:443
      - --api.dashboard=false
      - --ping=true
      - --ping.entrypoint=web
    ports:
      - "${PROXY_HTTP_PUBLISHED_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      zitadel-api:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:${ZITADEL_VERSION}
    restart: unless-stopped
    user: "0"
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY}"
    environment:
      ZITADEL_PORT: 8080
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_DOMAIN}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT}
      ZITADEL_EXTERNALSECURE: ${ZITADEL_EXTERNALSECURE}
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_DSN: ${ZITADEL_DATABASE_POSTGRES_DSN}

      # First-instance bootstrap: an admin machine user + PAT written to a
      # shared volume so provisioning scripts can authenticate without UI.
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Automatically Initialized IAM_LOGIN_CLIENT
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: ${LOGIN_CLIENT_PAT_EXPIRATION}
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/admin-machine.pat
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: admin-machine
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Admin Machine
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: ${ADMIN_MACHINE_PAT_EXPIRATION}

      # Login UI v2 wiring (matches the official compose).
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: "true"
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:rw
    networks:
      - zitadel
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=zitadel
      - traefik.http.services.zitadel-api.loadbalancer.server.port=8080
      - traefik.http.services.zitadel-api.loadbalancer.server.scheme=h2c
      - traefik.http.middlewares.zitadel-strip-api.stripprefix.prefixes=/api
      - traefik.http.routers.zitadel-api-alias-web.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.zitadel-api-alias-web.entrypoints=web
      - traefik.http.routers.zitadel-api-alias-web.middlewares=zitadel-strip-api
      - traefik.http.routers.zitadel-api-alias-web.service=zitadel-api
      - traefik.http.routers.zitadel-api-alias-web.priority=200
      - traefik.http.routers.zitadel-canonical-web.rule=Host(`${ZITADEL_DOMAIN}`) && !PathPrefix(`/ui/v2/login`) && !PathPrefix(`/api`) && !Path(`/`)
      - traefik.http.routers.zitadel-canonical-web.entrypoints=web
      - traefik.http.routers.zitadel-canonical-web.service=zitadel-api
      - traefik.http.routers.zitadel-canonical-web.priority=100

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:${ZITADEL_VERSION}
    restart: unless-stopped
    user: "0"
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:${ZITADEL_DOMAIN},X-Forwarded-Proto:${ZITADEL_PUBLIC_SCHEME}
    healthcheck:
      test:
        - CMD
        - /bin/sh
        - -c
        - node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    networks:
      - zitadel
    depends_on:
      zitadel-api:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=zitadel
      - traefik.http.services.zitadel-login.loadbalancer.server.port=3000
      - traefik.http.middlewares.zitadel-root-rewrite.replacepath.path=/ui/v2/login/
      - traefik.http.routers.zitadel-root-web.rule=Host(`${ZITADEL_DOMAIN}`) && Path(`/`)
      - traefik.http.routers.zitadel-root-web.entrypoints=web
      - traefik.http.routers.zitadel-root-web.middlewares=zitadel-root-rewrite
      - traefik.http.routers.zitadel-root-web.service=zitadel-login
      - traefik.http.routers.zitadel-root-web.priority=400
      - traefik.http.routers.zitadel-login-web.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/ui/v2/login`)
      - traefik.http.routers.zitadel-login-web.entrypoints=web
      - traefik.http.routers.zitadel-login-web.service=zitadel-login
      - traefik.http.routers.zitadel-login-web.priority=250

  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_DB: ${POSTGRES_DB}            # the Zitadel database
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_ADMIN_USER}
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
      # Extra init script creates the `untenanted` database + role alongside
      # Zitadel's. Loaded once on the first boot of the data volume.
      - ./infra/postgres/02-untenanted.sql:/docker-entrypoint-initdb.d/02-untenanted.sql:ro
    networks:
      - zitadel

  untenanted-api:
    # Replace with your published image — kept as build for the local example.
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      HTTP_PORT: 3000
      LOG_LEVEL: info
      AUTO_MIGRATE: "true"

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: untenanted
      DB_USER: untenanted
      DB_PASSWORD: untenanted
      DB_SSL: disable

      # Same hostname for JWKS, issuer and token endpoint — host-resolvable
      # via public localtest.me DNS AND container-resolvable via the proxy
      # network alias.
      IDP_JWKS_URI: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/oauth/v2/keys
      IDP_ISSUER: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}
      IDP_AUDIENCE: ${UNTENANTED_AUDIENCE}
      IDP_TOKEN_ENDPOINT: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/oauth/v2/token
      IDP_CLIENT_ID: ${UNTENANTED_CLIENT_ID}
      IDP_CLIENT_SECRET: ${UNTENANTED_CLIENT_SECRET}

      CLAIM_ORG_ID: ${CLAIM_ORG_ID}
      CLAIM_TIDS: ${CLAIM_TIDS}
      CLAIM_SCOPE: scope
      CLAIM_SUBJECT: sub

      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET}
      WEBHOOK_AUTH_SECRET: ${WEBHOOK_AUTH_SECRET}

      # Opt in to the bundled Zitadel adapter (a Fastify plugin from
      # `@untenanted/adapter-zitadel`). The signing keys list is filled in
      # after the configure-zitadel.sh script creates the Targets — each
      # Target gets a unique HMAC key, and we accept any of them.
      IDP_ADAPTERS: zitadel
      ADAPTER_ZITADEL_SIGNING_KEYS: ${ADAPTER_ZITADEL_SIGNING_KEYS:-}
      ADAPTER_ZITADEL_TIDS_CLAIM: ${CLAIM_TIDS}
      ADAPTER_ZITADEL_ORG_CLAIM: ${CLAIM_ORG_ID}
    depends_on:
      postgres:
        condition: service_healthy
      zitadel-api:
        condition: service_healthy
    ports:
      - "${UNTENANTED_HOST_PORT}:3000"
    networks:
      - zitadel

networks:
  zitadel:
    name: zitadel

volumes:
  postgres-data:
  zitadel-bootstrap:

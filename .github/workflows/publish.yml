name: Publish to npm

# Two triggers:
#   1) Push a tag matching v* (e.g. v0.2.0) → publishes whatever versions are
#      in the workspace at that commit. Bump the package.json versions BEFORE
#      tagging — pnpm publish skips packages whose version already exists on
#      the registry, so re-running is safe-ish but won't produce new releases.
#   2) Manual `workflow_dispatch` for ad-hoc releases from main.
#
# Requires repository secret NPM_TOKEN: a granular access token with publish
# permission to the @untenanted scope. Generate at
# https://www.npmjs.com/settings/<user>/tokens and add via
# Settings → Secrets and variables → Actions.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (no publish)"
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test, publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write       # enables npm provenance attestation
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org/
          scope: "@untenanted"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish (dry-run)
        if: ${{ inputs.dry_run == true }}
        run: pnpm -r publish --access public --no-git-checks --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: ${{ inputs.dry_run != true }}
        run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
